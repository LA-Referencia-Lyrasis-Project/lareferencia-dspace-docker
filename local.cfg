webui.supported.locales = en, es, pt_BR


# -----------------------------------------------------------------------
# embeddings.cfg
#
# OpenAI-compatible embedding endpoint settings used for Solr vector
# indexing and semantic search.
# -----------------------------------------------------------------------

# OpenAI-compatible endpoint for indexing (e.g. local service or Ollama-compatible proxy)
embeddings.api.url.indexing = http://localhost:8989/api/v1/embeddings
# Embedding model used for indexing-time embeddings
embeddings.model.indexing = e8a730bb-e48f-4cd8-94c4-4f2be2530d8f

# OpenAI-compatible endpoint for search-time embedding generation
embeddings.api.url.search = http://172.16.115.105:11434/v1/embeddings
# Embedding model used for search-time embeddings
embeddings.model.search = bge-m3

# Optional legacy fallback endpoint used when indexing/search URLs are not set
embeddings.api.url =

# Optional API key. Leave empty for providers that do not require auth.
embeddings.api.key =

# Optional legacy fallback model used when indexing/search models are not set
embeddings.model =

# Expected vector size returned by the model
embeddings.vector.dimension = 1024

# HTTP timeout for embedding requests in milliseconds
embeddings.api.timeout.ms = 10000

# Number of nearest neighbors requested in semantic search
embeddings.search.topK = 10

embeddings.search.min.return = 0.8

semantic.search.enabled = true

embeddings.search.query.parser = knn

embeddings.solr.vector.field = vector

embeddings.solr.multi.vectors=false
